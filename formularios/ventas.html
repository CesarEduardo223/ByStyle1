<div class="card" style="margin-top: 20px;">
    <h2>Nueva Transacción</h2>
    <form action="/procesar_pedido" method="POST">
        <div class="group">
            <label for="fecha">Fecha del Pedido</label>
            <input type="date" id="fecha" name="fecha" required>
        </div>
        <div class="group">
            <label for="cliente_id">ID Cliente (FK)</label>
            <input type="number" id="cliente_id" name="cliente_id" placeholder="Ej: 101" required>
        </div>
        <div class="group">
            <label for="estado">Estado de la Orden</label>
            <select id="estado" name="estado">
                <option value="pendiente">Pendiente</option>
                <option value="pagado">Pagado</option>
                <option value="enviado">Enviado</option>
            </select>
        </div>
        <button type="submit" style="background-color: #e67e22;">Crear Pedido</button>
    </form>
</div>

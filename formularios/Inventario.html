<div class="card" style="margin-top: 20px;">
    <h2>Gestión de Productos</h2>
    <form action="/guardar_producto" method="POST">
        <div class="group">
            <label for="prod_nombre">Nombre del Producto</label>
            <input type="text" id="prod_nombre" name="prod_nombre" required>
        </div>
        <div class="group">
            <label for="precio">Precio Unitario ($)</label>
            <input type="number" step="0.01" id="precio" name="precio" required>
        </div>
        <div class="group">
            <label for="stock">Cantidad en Stock</label>
            <input type="number" id="stock" name="stock" required>
        </div>
        <div class="group">
            <label for="categoria">Categoría</label>
            <select id="categoria" name="categoria">
                <option value="cat1">Electrónica</option>
                <option value="cat2">Hogar</option>
                <option value="cat3">Otros</option>
            </select>
        </div>
        <button type="submit" style="background-color: #3498db;">Guardar Producto</button>
    </form>
</div>
